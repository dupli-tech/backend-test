name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

env:
  REVIEW_PROMPT: |
    Você é um revisor sênior de PR pra fintech.

    Revise a PR atual seguindo as convenções de CLAUDE.md.

    Foque em:
    1. Correção: bugs, edge cases, error handling, concorrência
    2. Segurança: input validation, secrets, auth, SQL injection, vazamento de dados em logs
    3. Performance: queries N+1, allocs desnecessárias, goroutine leaks
    4. Manutenibilidade: legibilidade, nomenclatura, testes
    5. Aderência às convenções do CLAUDE.md

    Formato da review:
    - Comentários inline em linhas específicas pra problemas pontuais
    - Resumo geral no fim com: aprovação condicional, bloqueios, ou aprovado
    - Sugestões de melhoria marcadas como [nit] são opcionais

jobs:
  route-and-review:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !github.event.pull_request.draft &&
      (
        github.event_name == 'pull_request' ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Identificar autor da PR
        id: author
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            AUTHOR="${{ github.event.pull_request.user.login }}"
          else
            PR_NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
            AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
          fi
          echo "pr_author=$AUTHOR" >> $GITHUB_OUTPUT

      - name: Selecionar OAuth token
        id: route
        run: |
          case "${{ steps.author.outputs.pr_author }}" in
            ${{ vars.HANDLE_LUCA }})
              echo "owner=luca" >> $GITHUB_OUTPUT
              ;;
            ${{ vars.HANDLE_SOCIO }})
              echo "owner=socio" >> $GITHUB_OUTPUT
              ;;
            *)
              PR_NUM="${{ github.event.pull_request.number || github.event.issue.number }}"
              if [ $((PR_NUM % 2)) -eq 0 ]; then
                echo "owner=luca" >> $GITHUB_OUTPUT
              else
                echo "owner=socio" >> $GITHUB_OUTPUT
              fi
              ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar paths sensíveis
        id: paths
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          CHANGED=$(gh pr diff "$PR_NUMBER" --name-only)

          if echo "$CHANGED" | grep -qE '(internal/(auth|payment|scd|baas|keys|crypto)/|/migrations/|\.sql$)'; then
            echo "model=claude-opus-4-6" >> $GITHUB_OUTPUT
            echo "sensitive=true" >> $GITHUB_OUTPUT
          else
            echo "model=claude-sonnet-4-6" >> $GITHUB_OUTPUT
            echo "sensitive=false" >> $GITHUB_OUTPUT
          fi

      - name: Review (Luca)
        if: steps.route.outputs.owner == 'luca'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.OAUTH_LUCA }}
          prompt: |
            ${{ env.REVIEW_PROMPT }}
            ${{ steps.paths.outputs.sensitive == 'true' && 'PATH SENSÍVEL (auth/payment/scd/baas/keys): seja rigoroso. Compliance e segurança são prioridade. Bloqueie se houver QUALQUER dúvida regulatória.' || '' }}
          claude_args: "--model ${{ steps.paths.outputs.model }} --max-turns 15"

      - name: Review (Sócio)
        if: steps.route.outputs.owner == 'socio'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.OAUTH_SOCIO }}
          prompt: |
            ${{ env.REVIEW_PROMPT }}
            ${{ steps.paths.outputs.sensitive == 'true' && 'PATH SENSÍVEL (auth/payment/scd/baas/keys): seja rigoroso. Compliance e segurança são prioridade. Bloqueie se houver QUALQUER dúvida regulatória.' || '' }}
          claude_args: "--model ${{ steps.paths.outputs.model }} --max-turns 15"
